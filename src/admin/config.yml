backend:
  name: github
  repo: BigDumbYak-Git/theatre17website
  branch: main
  base_url: theatre17-cms-auth.bigdumbyak.workers.dev

# Media uploads — stored in the repo under src/assets/uploads
media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

# Show the CMS at /admin
site_url: https://theatre17.netlify.app

# =============================================
# COLLECTIONS
# Each collection = one content type in the CMS
# =============================================

collections:

  # -------------------------------------------
  # SHOWS
  # Used for both the current show and the archive.
  # Editors fill in all fields; the site uses
  # the "current_show" flag to determine what
  # appears on the homepage and Current Show page.
  # -------------------------------------------
  - name: "shows"
    label: "Shows"
    label_singular: "Show"
    folder: "src/shows"
    create: true
    slug: "{{year}}-{{slug}}"
    summary: "{{title}} ({{year}}) — {{status}}"
    preview_path: "show.html"
    fields:

      - label: "Show Title"
        name: "title"
        widget: "string"
        hint: "e.g. The Importance of Being Earnest"

      - label: "Playwright / Writer"
        name: "playwright"
        widget: "string"
        hint: "e.g. Oscar Wilde, Rodgers & Hammerstein"
        required: false

      - label: "Season Year"
        name: "year"
        widget: "number"
        value_type: "int"
        min: 1972
        max: 2100
        hint: "The year the show ran"

      - label: "Season"
        name: "season"
        widget: "select"
        options: ["Spring", "Fall", "Winter", "Summer", "Special"]
        hint: "Which season of the year did this run?"

      - label: "Show Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Planning", value: "planning" }
          - { label: "Auditions Open", value: "auditions" }
          - { label: "In Rehearsal", value: "rehearsal" }
          - { label: "Performances Underway", value: "performances" }
          - { label: "Closed", value: "closed" }
        default: "closed"

      - label: "This is the current show"
        name: "current_show"
        widget: "boolean"
        default: false
        hint: "Turn ON for the show currently running or upcoming. Turn OFF for all past shows. Only one show should have this set to ON at a time."

      - label: "Performance Dates"
        name: "dates"
        widget: "string"
        hint: "e.g. April 25 – May 4, 2025"
        required: false

      - label: "Opening Night"
        name: "opening_date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "MMMM D, YYYY"
        time_format: false
        required: false

      - label: "Closing Night"
        name: "closing_date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "MMMM D, YYYY"
        time_format: false
        required: false

      - label: "Show Times"
        name: "show_times"
        widget: "string"
        hint: "e.g. Fridays & Saturdays 7:30 PM · Sunday 2:00 PM"
        required: false

      - label: "Venue"
        name: "venue"
        widget: "string"
        default: "Dryden Performing Arts Centre"
        required: false

      - label: "Show Poster"
        name: "poster"
        widget: "image"
        required: false
        hint: "Upload the show poster. Ideal ratio is 2:3 (portrait). JPG or PNG."

      - label: "Show Synopsis"
        name: "description"
        widget: "markdown"
        hint: "A few paragraphs describing the show for the public. This appears on the show page and the homepage."
        required: false

      - label: "Director's Note"
        name: "directors_note"
        widget: "markdown"
        hint: "Optional message from the director, displayed on the show page."
        required: false

      - label: "Ticket / Box Office Link"
        name: "ticket_url"
        widget: "string"
        hint: "Full URL to ticket purchase page (e.g. https://showstix4u.com/...)"
        required: false

      # Cast list — a repeating list of name + role pairs
      - label: "Cast"
        name: "cast"
        widget: "list"
        required: false
        hint: "Add each cast member. Click + to add a row."
        fields:
          - label: "Actor Name"
            name: "name"
            widget: "string"
          - label: "Role / Character"
            name: "role"
            widget: "string"

      # Creative/crew list — same structure as cast
      - label: "Creative & Production Team"
        name: "crew"
        widget: "list"
        required: false
        hint: "Add each crew or creative team member."
        fields:
          - label: "Name"
            name: "name"
            widget: "string"
          - label: "Role / Position"
            name: "role"
            widget: "string"
            hint: "e.g. Director, Set Design, Stage Manager, Lighting"

      # Photo gallery — multiple image uploads
      - label: "Production Photos"
        name: "gallery"
        widget: "list"
        required: false
        hint: "Upload production photos one at a time. They will appear in the gallery on the show page."
        fields:
          - label: "Photo"
            name: "image"
            widget: "image"
          - label: "Caption"
            name: "caption"
            widget: "string"
            required: false
            hint: "Optional photo caption"

  # -------------------------------------------
  # MEMBER BIOS
  # One entry per person. Can be linked from
  # show cast/crew lists by name.
  # -------------------------------------------
  - name: "members"
    label: "Members & Bios"
    label_singular: "Member"
    folder: "src/members"
    create: true
    slug: "{{slug}}"
    summary: "{{name}} — {{primary_role}}"
    fields:

      - label: "Full Name"
        name: "name"
        widget: "string"

      - label: "Photo"
        name: "photo"
        widget: "image"
        required: false
        hint: "Headshot or portrait. Square or portrait orientation works best."

      - label: "Primary Role(s)"
        name: "primary_role"
        widget: "string"
        hint: "e.g. Actor, Director, Set Designer, Stage Manager"

      - label: "Member Type"
        name: "member_type"
        widget: "select"
        options:
          - { label: "Current Member", value: "current" }
          - { label: "Alumni", value: "alumni" }
        default: "current"

      - label: "Performer or Crew?"
        name: "performer_or_crew"
        widget: "select"
        options:
          - { label: "Performer (on stage)", value: "cast" }
          - { label: "Crew / Creative (backstage)", value: "crew" }
          - { label: "Both", value: "both" }
        default: "cast"

      - label: "Bio"
        name: "bio"
        widget: "markdown"
        hint: "A short biography. 2–4 sentences works well."

      - label: "Shows (for display)"
        name: "shows_display"
        widget: "string"
        required: false
        hint: "A brief comma-separated list of notable shows, e.g. Earnest · Steel Magnolias · Wizard of Oz"

      - label: "Personal Website or Link"
        name: "external_url"
        widget: "string"
        required: false
        hint: "Optional — a personal website, LinkedIn, etc."

  # -------------------------------------------
  # NEWS POSTS
  # Blog-style entries for announcements,
  # audition calls, awards, community notices.
  # -------------------------------------------
  - name: "news"
    label: "News & Announcements"
    label_singular: "Post"
    folder: "src/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} ({{date}})"
    sortable_fields: ["date", "title", "category"]
    view_filters:
      - label: "Auditions"
        field: "category"
        pattern: "auditions"
      - label: "News"
        field: "category"
        pattern: "news"
      - label: "Awards"
        field: "category"
        pattern: "awards"
    fields:

      - label: "Post Title"
        name: "title"
        widget: "string"

      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "MMMM D, YYYY"
        time_format: false
        default: ""

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "News", value: "news" }
          - { label: "Auditions", value: "auditions" }
          - { label: "Awards", value: "awards" }
          - { label: "Community", value: "community" }
          - { label: "Youth Theatre", value: "youth" }
        default: "news"

      - label: "Featured Image"
        name: "image"
        widget: "image"
        required: false
        hint: "Optional photo to accompany the post."

      - label: "Summary"
        name: "summary"
        widget: "text"
        hint: "1–2 sentences shown in the news listing. Keep it brief."
        required: false

      - label: "Full Post Body"
        name: "body"
        widget: "markdown"
        hint: "The full text of the announcement or news item."

  # -------------------------------------------
  # SITE SETTINGS
  # Single-instance file — controls site-wide
  # values like group name, contact info, socials.
  # Only admins should edit this.
  # -------------------------------------------
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "src/_data/settings/general.json"
        fields:

          - label: "Group Name"
            name: "group_name"
            widget: "string"
            default: "Theatre 17"

          - label: "Tagline"
            name: "tagline"
            widget: "string"
            default: "Dryden's Community Theatre Since 1972"
            hint: "Short description shown in the footer and meta tags."

          - label: "Contact Email"
            name: "contact_email"
            widget: "string"
            hint: "The main contact email address shown on the Contact page."

          - label: "Facebook Page URL"
            name: "facebook_url"
            widget: "string"
            required: false
            hint: "Full URL to your Facebook page."

          - label: "Instagram URL"
            name: "instagram_url"
            widget: "string"
            required: false

          - label: "Footer Text"
            name: "footer_text"
            widget: "string"
            default: "Dryden's community theatre group, bringing live performance to Northwestern Ontario since 1972."
            hint: "Short tagline that appears under the logo in the footer."

          - label: "City & Province"
            name: "location"
            widget: "string"
            default: "Dryden, Ontario, Canada"
